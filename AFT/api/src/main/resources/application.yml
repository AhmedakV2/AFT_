spring:
  application:
    name: aft-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aft}
    username: ${DB_USER:aft}
    password: ${DB_PASSWORD:aft_local_pw}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:aft}
    password: ${RABBIT_PASSWORD:aft_local_pw}

aft:
  jwt:
    secret: ${JWT_SECRET=e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    screenshot-bucket: ${STORAGE_SCREENSHOT_BUCKET:aft-screenshots}
    export-bucket: ${STORAGE_EXPORT_BUCKET:aft-exports}
  limits:
    max-concurrent-runs-per-user: ${MAX_CONCURRENT_RUNS_PER_USER:5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8080