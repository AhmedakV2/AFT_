spring:
  application:
    name: worker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aft}
    username: ${DB_USERNAME:aft}
    password: ${DB_PASSWORD:aft_local_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:aft}
    password: ${RABBITMQ_PASSWORD:aft_local_pw}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 5s
          multiplier: 2
        default-requeue-rejected: false

aft:
  selenium:
    grid-url: ${SELENIUM_GRID_URL:http://localhost:4444}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    screenshot-bucket: ${STORAGE_SCREENSHOT_BUCKET:aft-screenshots}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8081